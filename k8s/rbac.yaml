subjects:
- kind: User
  name: bedrock-dev-view
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: view # Standard read-only ClusterRole
  apiGroup: rbac.authorization.k8s.io