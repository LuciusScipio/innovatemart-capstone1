name: "Project Bedrock Infrastructure CI/CD"

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Terraform Init
        run: terraform init
        working-directory: ./terraform

      - name: Terraform Plan
        if: github.event_name == 'pull_request'
        run: terraform plan -no-color
        working-directory: ./terraform

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve
        working-directory: ./terraform

      - name: Deploy Retail Application to EKS
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          aws eks update-kubeconfig --region us-east-1 --name project-bedrock-cluster
          kubectl create namespace retail-space --dry-run=client -o yaml | kubectl apply -f -
          
          # Adjust this path below if your yaml manifest file sits in a different directory
          if [ -f ../kubernetes/retail-app-manifests.yaml ]; then
            kubectl apply -f ../kubernetes/retail-app-manifests.yaml -n retail-space
          else
            echo "Manifest file not found at default path, checking root..."
            kubectl apply -f ../retail-app-manifests.yaml -n retail-space
          fi
          
          sleep 10
          kubectl get service ui -n retail-space